<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biografía - El Sol de México</title>
  <link rel="stylesheet" href="css/metro-bootstrap.css" />
  <link rel="stylesheet" href="css/estilos.css" />
  <style>
    html, body {
      background: linear-gradient(135deg, #000000, #000000ca);
  background-size: 200% 200%;
  background-attachment: fixed;
    }
    h1, h2, .brillo-animado {
      font-family: 'Bebas Neue', cursive;
    }
   
    .container {
      min-height: 100vh;
      margin-left: 100px;
      padding: 20px;
      box-sizing: border-box;
    }

    header {
      text-align: center;
      padding: 40px 20px;
      position: relative;
    }

    .brillo-animado {
      font-size: 4rem;
      font-weight: bold;
      background: linear-gradient(45deg, #1d0d37, #2262ab, #FFFACD);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: brillo 2s linear infinite;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }

    @keyframes brillo {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .icon-bar {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #a20025;
      padding: 30px 0;
      width: 100px;
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
    }

    .icon-bar a {
      color: white;
      font-size: 48px;
      margin: 25px 0;
      text-decoration: none;
      transition: color 0.3s ease, transform 0.3s ease;
    }

    .icon-bar a:hover {
      color: #FFD700;
      transform: scale(1.2);
    }

    
    .galeria {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  justify-items: center;
  padding: 20px;
}

.galeria img {
  width: 100%;
  max-width: 250px;
  border-radius: 15px;
  border: 4px solid #5e043c80;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
  transition: transform 0.3s ease;
}

.galeria img:hover {
  transform: scale(1.05);
}

  </style>
</head>
<body>

  <!-- Barra de íconos -->
  <div class="icon-bar">
    <a href="index.html" >🌞</a>
    <a href="index2.html" >📖</a>
    <a href="index3.html" >💿</a>
    <a href="index4.html" >❤️</a>
    <a href="index5.html" >🎬</a>
    <a href="index6.html" >📷</a>
  </div>

  <div class="container">
    <header>
      <h1><span class="brillo-animado">GALERÍA DE FOTOS</span></h1>
    </header>

    <section class="galeria">
  <img src="img/mi.jpg" alt="Luis Miguel joven">
  <img src="img/mi2.jpg" alt="Luis Miguel joven">
  <img src="img/mi3.jpg" alt="Luis Miguel joven">
  <img src="img/mi4.jpg" alt="Luis Miguel joven">
  <img src="img/mi5.jpg" alt="Luis Miguel joven">
  <img src="img/mi6.jpg" alt="Luis Miguel joven">
  <img src="img/mi7.jpg" alt="Luis Miguel joven">
  <img src="img/mi8.jpg" alt="Luis Miguel joven">
  <img src="img/mi9.jpg" alt="Luis Miguel joven">
</section>

    

  </div>

</body>
</html>
